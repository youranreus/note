version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: note-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://note:${MYSQL_PASSWORD}@db:3306/note
      - NUXT_SESSION_PASSWORD=${SESSION_PASSWORD}
      - NUXT_SSO_URL=${SSO_URL}
      - NUXT_SSO_ID=${SSO_ID}
      - NUXT_SSO_SECRET=${SSO_SECRET}
      - NUXT_SSO_REDIRECT=${SSO_REDIRECT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - note-net

  db:
    image: mysql:8.0
    container_name: note-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: note
      MYSQL_USER: note
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - note-net

  nginx:
    image: nginx:alpine
    container_name: note-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - note-net
    profiles:
      - with-nginx

volumes:
  mysql-data:

networks:
  note-net:
    driver: bridge
